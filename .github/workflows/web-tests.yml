# Tests Vitest du module `web/` (auth-regression, etc.) avant merge / aligné avec le build Docker Fly.
name: Web tests

on:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'
  workflow_dispatch:

concurrency:
  group: web-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (auth regression suite)
        run: npm run test
